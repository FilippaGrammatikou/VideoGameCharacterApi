services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: videogamecharacterapi-db
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "14333:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./database:/var/opt/mssql/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-restore:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: videogamecharacterapi-db-restore
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/var/opt/mssql/backup:ro
    entrypoint: ["/bin/bash", "/var/opt/mssql/backup/restore-db.sh"]

  api:
    build:
      context: .
      dockerfile: VideoGameCharacterApi/Dockerfile
    container_name: videogamecharacterapi-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      db-restore:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ConnectionStrings__DefaultConnection: "Server=db;Database=VideoGameCharactersDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
    ports:
      - "8080:8080"

volumes:
  sql_data: