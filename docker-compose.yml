services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: videogamecharacterapi-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "14333:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./database:/var/opt/mssql/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    db-restore:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: videogamecharacterapi-db-restore
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/var/opt/mssql/backup:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: >-
      for i in $(seq 1 20); do
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -C -Q "SELECT 1" >/dev/null 2>&1 && break;
        echo 'Waiting for SQL Server on host db...';
        sleep 5;
      done;
      /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -C -Q "
      IF DB_ID(N'VideoGameCharactersDb') IS NULL
      BEGIN
        RESTORE DATABASE [VideoGameCharactersDb]
        FROM DISK = N'/var/opt/mssql/backup/VideoGameCharactersDb.bak'
        WITH
          MOVE N'VideoGameCharactersDb' TO N'/var/opt/mssql/data/VideoGameCharactersDb.mdf',
          MOVE N'VideoGameCharactersDb_log' TO N'/var/opt/mssql/data/VideoGameCharactersDb_log.ldf',
          RECOVERY,
          REPLACE;
      END
      "

  api:
    build:
      context: .
      dockerfile: VideoGameCharacterApi/Dockerfile
    container_name: videogamecharacterapi-api
    depends_on:
      db:
        condition: service_healthy
      db-restore:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db;Database=VideoGameCharactersDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
      Jwt__Key: "THIS_IS_A_DEVELOPMENT_ONLY_SECRET_KEY_12345"
      Jwt__Issuer: "VideoGameCharacterApi"
      Jwt__Audience: "VideoGameCharacterApiUsers"
    ports:
      - "8080:8080"

volumes:
  sql_data: